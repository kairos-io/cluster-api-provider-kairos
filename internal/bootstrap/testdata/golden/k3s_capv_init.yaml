#cloud-config

hostname: kairos-cp-0

users:
- name: kairos
  groups:
    - admin
  ssh_authorized_keys:
    - github:testuser
- name: capk
  groups: [users, admin]

# Control-plane node configuration
# Pass providerID at k3s startup so node registers with the correct providerID
# (avoids the k3s default providerID vs infra providerID mismatch).
# Use both k3s.args (Kairos) and config file drop-in (k3s loads /etc/rancher/k3s/config.yaml.d/*.yaml on every start)
# ProviderID is regex-validated by validateTemplateData before rendering — see internal/bootstrap/validate.go.
k3s:
  enabled: true
  args:
    # ADR 0005 (HA) init node: bootstrap the embedded-etcd cluster. The serving
    # cert MUST cover the stable control-plane endpoint (the VIP / InfraCluster
    # endpoint), so --tls-san is set to ControlPlaneEndpointHost — NOT the VIP
    # block, which only drives the kube-vip manifest that makes that endpoint
    # floatable. ControlPlaneEndpointHost is shquote-safe (validated, no shell
    # context here — it lands in a YAML list item) and quote'd accordingly.
    #
    # --token-file pins the shared K3S_TOKEN on the init node from the SAME token
    # file the joiners read (written below for every HA role from .JoinToken).
    # Without this, k3s --cluster-init auto-generates a random server token that
    # the joiners can never match, so the cluster never forms. (ADR 0005 Phase 3,
    # BLOCKER-1.)
    - --cluster-init
    - --token-file=/etc/rancher/k3s/server-token
    - --tls-san=192.168.1.240
write_files:
  - path: /system/oem/12_kairos-capi-persistency.yaml
    permissions: "0644"
    owner: root
    group: root
    content: |
      name: "Kairos CAPI persistent state paths"
      stages:
        rootfs:
          - environment_file: /run/cos/extra-layout.env
            environment:
              PERSISTENT_STATE_PATHS: "/etc/cni /etc/k0s /etc/kubernetes /etc/rancher /etc/ssh /etc/systemd /var/lib/cni /var/lib/containerd /var/lib/k0s /var/lib/kubelet /var/lib/rancher /var/log"
  # systemd drop-in: skip k3s.service on the Kairos live installer.
  # See the same drop-in in k3s_kairos_cloud_config_capk.yaml.tmpl for
  # rationale. KD-3b lab finding on Hadron, harmless on Ubuntu-Kairos.
  - path: /etc/systemd/system/k3s.service.d/00-skip-on-live-installer.conf
    permissions: "0644"
    owner: root
    group: root
    content: |
      [Unit]
      ConditionKernelCommandLine=!cdroot
  # tls-san for the apiserver serving cert. The cert generated by k3s
  # on first start defaults to only the node's local IPs + cluster-DNS
  # names; if CAPI's clustercache connects from the management cluster
  # using a different address (e.g., the VM's LAN IP via
  # Cluster.Spec.ControlPlaneEndpoint), TLS verification fails with
  # "certificate is valid for X but not Y". Writing tls-san to
  # config.yaml.d ensures k3s regenerates the cert with the right SAN.
  # KD-3b finding from CAPK lab; applies equally to CAPV.
  - path: /etc/rancher/k3s/config.yaml.d/91-tls-san.yaml
    permissions: "0644"
    owner: root
    group: root
    content: |
      tls-san:
        - 192.168.1.240
  # ADR 0005 (HA): shared k3s server token, written on BOTH init and join nodes
  # (IsHAControlPlane) so every HA control-plane member uses the same K3S_TOKEN —
  # the init node from --token-file (above) and joiners from --server+--token-file.
  # Sourced from .JoinToken, which the Phase-3 controller generates once
  # (crypto/rand) and resolves from a management-cluster Secret via *SecretRef
  # (TOKEN-INV). The value lands here as a YAML block scalar guarded by
  # rejectControlChars (no shquote — this is not a shell context). 0600: this is
  # a cluster-join secret on disk.
  - path: /etc/rancher/k3s/server-token
    permissions: "0600"
    owner: root
    group: root
    content: |
      
  # ADR 0005 § D.1 (HA) kube-vip DaemonSet + RBAC (CAPV/CAPM3 only; CAPK uses its
  # built-in LoadBalancer Service per OQ-5 and never reaches this block).
  # k3s auto-applies manifests under /var/lib/rancher/k3s/server/manifests at
  # server start. The manifest is a multi-document set (ServiceAccount +
  # ClusterRole + ClusterRoleBinding + DaemonSet) produced by kubeVIPManifest
  # (marshaled YAML, VIP-INV-2) — no operator string is concatenated into the
  # YAML. The DaemonSet runs one kube-vip per control-plane Node (k3s servers are
  # schedulable and carry node-role.kubernetes.io/control-plane, so no
  # --enable-worker is needed as on k0s); the instances leader-elect on the
  # plndr-cp-lock Lease (hence the RBAC) and the leader ARPs the floating
  # control-plane VIP, so VIP ownership fails over when the leader's Node dies.
  - path: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
    permissions: "0644"
    owner: root
    group: root
    content: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
          name: kube-vip
          namespace: kube-system
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
          name: system:kube-vip-role
      rules:
          - apiGroups:
              - ""
            resources:
              - services
              - services/status
              - nodes
              - endpoints
            verbs:
              - get
              - list
              - watch
              - update
          - apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - update
              - create
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
          name: system:kube-vip-binding
      roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:kube-vip-role
      subjects:
          - kind: ServiceAccount
            name: kube-vip
            namespace: kube-system
      ---
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
          name: kube-vip
          namespace: kube-system
          labels:
              app.kubernetes.io/name: kube-vip
      spec:
          selector:
              matchLabels:
                  app.kubernetes.io/name: kube-vip
          template:
              metadata:
                  labels:
                      app.kubernetes.io/name: kube-vip
              spec:
                  serviceAccountName: kube-vip
                  hostNetwork: true
                  nodeSelector:
                      node-role.kubernetes.io/control-plane: "true"
                  tolerations:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
                        effect: NoSchedule
                      - key: node-role.kubernetes.io/master
                        operator: Exists
                        effect: NoSchedule
                  containers:
                      - name: kube-vip
                        image: ghcr.io/kube-vip/kube-vip:v0.8.7
                        imagePullPolicy: IfNotPresent
                        args:
                          - manager
                        env:
                          - name: vip_arp
                            value: "true"
                          - name: vip_interface
                            value: eth0
                          - name: address
                            value: 192.168.1.240
                          - name: port
                            value: "6443"
                          - name: cp_enable
                            value: "true"
                          - name: svc_enable
                            value: "false"
                          - name: vip_leaderelection
                            value: "true"
                          - name: vip_leaseduration
                            value: "5"
                          - name: vip_renewdeadline
                            value: "3"
                          - name: vip_retryperiod
                            value: "1"
                          - name: bgp_enable
                            value: "false"
                        securityContext:
                          capabilities:
                              add:
                                  - NET_ADMIN
                                  - NET_RAW
                        volumeMounts:
                          - mountPath: /etc/kubernetes/admin.conf
                            name: kubeconfig
                  volumes:
                      - name: kubeconfig
                        hostPath:
                          path: /etc/kubernetes/admin.conf
          updateStrategy:
              type: RollingUpdate
  - path: /usr/local/etc/hostname
    permissions: "0644"
    owner: root
    group: root
    content: |
      kairos-cp-0
  - path: /etc/systemd/system/kairos-k3s-post-bootstrap.service
    permissions: "0644"
    owner: root
    group: root
    content: |
      [Unit]
      Description=Kairos k3s post-bootstrap tasks
      # Skip on Kairos live installer (cdroot present in cmdline) — the
      # post-bootstrap script would block for 7+ minutes waiting for k3s
      # node registration that never happens on the installer (overlayfs
      # snapshotter cannot nest on the live tmpfs overlay), holding up
      # cloud-init's runcmd and preventing kairos-agent from rebooting
      # into the installed system. (KD-3b lab finding on Hadron.)
      ConditionKernelCommandLine=!cdroot
      After=k3s.service
      Wants=k3s.service
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/bin/kairos-k3s-post-bootstrap.sh
      
      [Install]
      WantedBy=multi-user.target
  # Systemd override: write providerID to k3s config before k3s starts.
  # k3s loads /etc/rancher/k3s/config.yaml.d/*.yaml at startup - more reliable than wrapper.
  # Use z-provider-id.conf so it loads after override.conf (Kairos/other configs).
  - path: /etc/systemd/system/k3s.service.d/z-provider-id.conf
    permissions: "0644"
    owner: root
    group: root
    content: |
      [Service]
      ExecStartPre=/bin/sh -c '/usr/local/bin/kairos-k3s-discover-provider-id.sh || true'
  # VM self-discovery of providerID when not available at bootstrap (runs before k3s via ExecStartPre).
  # Omitted for Metal3: discovery is done at post-bootstrap via config-drive read (ADR 0004).
  # Writes to k3s config file - k3s loads config.yaml.d/*.yaml at startup
  - path: /usr/local/bin/kairos-k3s-discover-provider-id.sh
    permissions: "0755"
    owner: root
    group: root
    content: |
      #!/bin/bash
      set -e
      # Read DMI product_uuid (vSphere VMs expose VM UUID here)
      # DMI uses mixed-endian for first 3 groups; vSphere expects RFC/ISO (big-endian) - convert byte order
      if [ -f /sys/class/dmi/id/product_uuid ]; then
        RAW=$(cat /sys/class/dmi/id/product_uuid | tr -d ' \n\r')
        HEX=$(echo "$RAW" | tr -d '-' | tr '[:upper:]' '[:lower:]')
        if [ -n "$HEX" ] && [ ${#HEX} -eq 32 ]; then
          T0="${HEX:6:2}${HEX:4:2}${HEX:2:2}${HEX:0:2}"
          T1="${HEX:10:2}${HEX:8:2}"
          T2="${HEX:14:2}${HEX:12:2}"
          REST="${HEX:16:16}"
          FORMATTED="${T0}-${T1}-${T2}-${REST:0:4}-${REST:4:12}"
          PROVIDER_ID="vsphere://${FORMATTED}"
          mkdir -p /etc/rancher/k3s/config.yaml.d
          printf "kubelet-arg:\n  - provider-id=%s\n" "$PROVIDER_ID" > /etc/rancher/k3s/config.yaml.d/90-provider-id.yaml
          echo "Discovered providerID: $PROVIDER_ID"
        fi
      fi
  - path: /usr/local/bin/kairos-k3s-post-bootstrap.sh
    permissions: "0755"
    owner: root
    group: root
    content: |
      #!/bin/bash
      set -e
      # Push kubeconfig to management cluster without SSH (KD-3b).
      # CAPV has no LB Service: rewrite k3s.yaml's `server:` URL to use the
      # cluster's controlPlaneEndpoint host (CAPV-controlled, set on the
      # Cluster's spec by the infrastructure provider).
      push_kubeconfig() {
        local kubeconfig_file="/etc/rancher/k3s/k3s.yaml"
        # Wait up to 5min for k3s to write k3s.yaml. After=k3s.service only
        # orders against service activation, not bootstrap completion, so on
        # slower hosts (Hadron+CAPV lab finding) the file is not yet present
        # when this unit fires. Without this wait the unit silently abandons
        # the push and KCP stays in WaitingForNodePush forever (KD-3b).
        local _wait_budget=300
        local _wait_elapsed=0
        while [ ! -f "${kubeconfig_file}" ] && [ ${_wait_elapsed} -lt ${_wait_budget} ]; do
          sleep 5
          _wait_elapsed=$((_wait_elapsed + 5))
        done
        if [ ! -f "${kubeconfig_file}" ]; then
          echo "WARN: kubeconfig file not found at ${kubeconfig_file} after ${_wait_budget}s"
          return 1
        fi
        if ! command -v curl >/dev/null 2>&1; then
          echo "WARN: curl not available; cannot push kubeconfig"
          return 1
        fi
        if ! command -v base64 >/dev/null 2>&1; then
          echo "WARN: base64 not available; cannot push kubeconfig"
          return 1
        fi
        local kubeconfig_b64
        local tmp_kubeconfig
        tmp_kubeconfig=$(mktemp)
        local cp_endpoint_host='192.168.1.240'
        sed "s|https://[^[:space:]]*:6443|https://${cp_endpoint_host}:6443|g" "${kubeconfig_file}" > "${tmp_kubeconfig}"
        kubeconfig_b64=$(base64 -w 0 "${tmp_kubeconfig}" 2>/dev/null || base64 "${tmp_kubeconfig}" | tr -d '\n')
        rm -f "${tmp_kubeconfig}"
        local api='https://mgmt.example.com:6443'
        local ns='default'
        local name='cluster-kubeconfig'
        local token='mgmt-token'
        local cluster_name='ha-cluster'
        local payload
        payload="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${name}\",\"namespace\":\"${ns}\",\"labels\":{\"cluster.x-k8s.io/cluster-name\":\"${cluster_name}\"},\"annotations\":{\"controllers.cluster.x-k8s.io/kubeconfig-source\":\"node-push\"}},\"type\":\"cluster.x-k8s.io/secret\",\"data\":{\"value\":\"${kubeconfig_b64}\"}}"
        local url="${api}/api/v1/namespaces/${ns}/secrets/${name}"
        local status
        status=$(curl -k -sS -o /tmp/kairos-kubeconfig-push.log -w "%{http_code}" \
          -H "Authorization: Bearer ${token}" \
          -H "Content-Type: application/json" \
          -X PUT \
          --data "${payload}" \
          "${url}" || true)
        if [ "${status}" = "404" ]; then
          status=$(curl -k -sS -o /tmp/kairos-kubeconfig-push.log -w "%{http_code}" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -X POST \
            --data "${payload}" \
            "${api}/api/v1/namespaces/${ns}/secrets" || true)
        fi
        if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
          echo "Pushed kubeconfig to management secret ${ns}/${name}"
          return 0
        fi
        echo "WARN: failed to push kubeconfig to management cluster (status ${status})"
        return 1
      }
      if ! push_kubeconfig; then
        echo "WARN: kubeconfig push failed; proceeding without blocking bootstrap"
      fi

      # Mark bootstrap success for CAPI/CAPK consumers
      mkdir -p /run/cluster-api
      echo "success" > /run/cluster-api/bootstrap-success.complete
      chmod 0644 /run/cluster-api/bootstrap-success.complete

      echo "k3s post-bootstrap tasks completed successfully"
stages:
  boot:
    - name: "Discover providerID for k3s (VM self-discovery)"
      commands:
        - /usr/local/bin/kairos-k3s-discover-provider-id.sh || true
    - name: "Ensure SSH service is enabled"
      commands:
        - systemctl enable --now sshd || systemctl enable --now ssh || true
    - name: "Ensure k3s directories exist"
      commands:
        - mkdir -p /etc/rancher/k3s
        - mkdir -p /etc/rancher/k3s/config.yaml.d

runcmd:
  # `enable --now`: create the multi-user.target.wants/ symlink AND start
  # the unit on this boot. Plain `enable` only creates the symlink; the
  # service would only auto-start on the NEXT boot — too late for the
  # KD-3b push pattern, which needs to fire on the first installed-system
  # boot. Same fix the k0s templates use via the helper service.
  - /bin/systemctl daemon-reload || true
  - /bin/systemctl enable --now kairos-k3s-post-bootstrap.service || true
