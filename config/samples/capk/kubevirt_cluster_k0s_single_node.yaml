# ============================================================================
# CAPK Sample: Single-Node k0s Cluster on Kairos OS with KubeVirt
# ============================================================================
#
# SETUP INSTRUCTIONS:
#
# 1. Run ./bin/kubevirt-env (see docs/QUICKSTART_CAPK.md) — creates the env and
#    uploads the Kairos image to CDI. Non-lab users: skip kubevirt-env and apply
#    the manifests directly against your own management cluster.
#
# 1.5. Apply the blank install-target DataVolume BEFORE the cluster manifest:
#    kubectl apply -f config/samples/capk/kairos-install-disk.yaml
#    (Kairos image DVs are live-installer images. The blank disk is the
#    actual install target for the OS. See docs/QUICKSTART_CAPK.md.)
#
# 2. Update the KubeVirtMachineTemplate below:
#    - Adjust CPU/memory/disk sizes
#    - nodeSelector is environment-specific; see note in the template below
#    - DataVolume names reference the Kairos image DV and the blank install disk
#
# 3. Apply the manifest:
#    kubectl apply -f config/samples/capk/kubevirt_cluster_k0s_single_node.yaml
#
# ============================================================================

# IMPORTANT: replace `password:` below with a strong value before applying.
# `openssl rand -base64 32` is fine. Inline UserPassword in KairosConfig is
# deprecated; this Secret pattern is the recommended way to provide it.
apiVersion: v1
kind: Secret
metadata:
  name: kairos-user-password
  namespace: default
type: Opaque
stringData:
  password: REPLACE_WITH_A_STRONG_PASSWORD
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: kairos-cluster-kv
  namespace: default
spec:
  # CAPK requires a LoadBalancer Service for the control-plane API.
  # Ensure a LoadBalancer implementation (e.g., MetalLB) is installed.
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: KubevirtCluster
    name: kairos-cluster-kv
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KairosControlPlane
    name: kairos-control-plane-kv-capk
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: kairos-cluster-kv
  namespace: default
spec: {}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KairosControlPlane
metadata:
  name: kairos-control-plane-kv-capk
  namespace: default
spec:
  replicas: 1
  version: "v1.34.1+k0s.1"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: KubevirtMachineTemplate
      name: kairos-control-plane-template-hostmodel-capk
      namespace: default
  kairosConfigTemplate:
    name: kairos-config-template-control-plane-capk
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: kairos-control-plane-template-hostmodel-capk
  namespace: default
spec:
  template:
    spec:
      # Bypass SSH sentinel check - kubeconfig push avoids SSH; SSH may fail in bridged setups
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          template:
            metadata:
              labels:
                kubevirt.io/domain: kairos-control-plane-template
            spec:
              # Schedule on a KVM-capable node. Remove this selector entirely if
              # all nodes support KVM, or replace the hostname value with one
              # that matches a KVM-capable node in your cluster.
              # nodeSelector:
              #   kubernetes.io/hostname: YOUR-KVM-NODE-HOSTNAME
              domain:
                cpu:
                  cores: 8
                  # Use host-model to match KubeVirt CPU model labels
                  model: host-passthrough
                resources:
                  requests:
                    memory: 12Gi
                devices:
                  disks:
                  # Match testVM behavior: install disk first, ISO second.
                  - name: installeriso
                    cdrom:
                      bus: sata
                    bootOrder: 2
                  - name: rootdisk
                    disk:
                      bus: virtio
                    bootOrder: 1
                  interfaces:
                  - name: default
                    masquerade: {}
                features:
                  smm:
                    enabled: true
                  acpi:
                    enabled: true
                # Use UEFI boot (image has GPT partition table with EFI System partition)
                # Disable secure boot to avoid boot issues
                firmware:
                  bootloader:
                    efi:
                      secureBoot: true
              networks:
              - name: default
                #multus:
                #  networkName: lan-bridge
                pod: {}
              volumes:
              - name: installeriso
                dataVolume:
                  name: kairos-rootdisk
              - name: rootdisk
                dataVolume:
                  name: kairos-install-disk
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KairosConfigTemplate
metadata:
  name: kairos-config-template-control-plane-capk
  namespace: default
spec:
  template:
    spec:
      role: control-plane
      distribution: k0s
      kubernetesVersion: "v1.34.1+k0s.1"
      install:
        auto: true
        device: "/dev/vda"
        reboot: true
      dnsServers:
        - "172.16.56.5"
        - "8.8.8.8"
      podCIDR: "10.201.0.0/16"
      serviceCIDR: "10.200.0.0/16"
      # Optional: Override detected control-plane IP for KubeVirt/multus
      # primaryIP: "192.168.1.50"
      userName: kairos
      # Password comes from a Secret (defined at the top of this file).
      # Alternative: set `sshPublicKey:` and omit `userPasswordSecretRef`.
      userPasswordSecretRef:
        name: kairos-user-password
      userGroups:
        - admin
      # Optional: Add GitHub user for SSH access
      # githubUser: "your-github-username"
      # Optional: Add SSH public key instead
      # sshPublicKey: "ssh-rsa AAAAB3NzaC1yc2E..."
