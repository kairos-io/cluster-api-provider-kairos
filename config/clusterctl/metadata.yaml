# clusterctl metadata.yaml
# This file is used by clusterctl to discover and install the provider.
# It is published alongside components.yaml in each release.
#
# sha256 values are intentionally omitted from all entries below.
# Release engineering populates them at publish time by hashing the
# final artifacts. Do NOT add `sha256: ""` — an empty string defeats
# clusterctl integrity checks silently (see config/CLAUDE.md §6).

apiVersion: clusterctl.cluster.x-k8s.io/v1beta1
kind: Metadata
releaseSeries:
  - major: 0
    minor: 1
    patches:
      # v0.1.0-alpha.1 — initial alpha (bootstrap + control-plane providers,
      # CAPD/CAPV/CAPK support, single-node k0s and k3s).
      - version: v0.1.0-alpha.1
        releaseDate: "2026-04-15"
        contract: v1beta2
        url: https://github.com/kairos-io/cluster-api-provider-kairos/releases/download/v0.1.0-alpha.1/components.yaml
        # sha256 populated by release engineering at publish time.

      # v0.1.0-alpha.2 — Metal3/CAPM3 bare-metal support, default-credentials
      # removal, SSH eliminated from controller hot path, SSHFallback opt-in,
      # spec.files rendering, KairosControlPlaneTemplate webhook, reconcileDelete
      # cleanup (KD-4), latched-failure recovery (KD-14).
      - version: v0.1.0-alpha.2
        releaseDate: "2026-06-18"
        contract: v1beta2
        url: https://github.com/kairos-io/cluster-api-provider-kairos/releases/download/v0.1.0-alpha.2/components.yaml
        # sha256 populated by release engineering at publish time.

      # v0.1.0 — not yet released.
      - version: v0.1.0
        releaseDate: "2024-11-21"
        contract: v1beta2
        url: https://github.com/kairos-io/cluster-api-provider-kairos/releases/download/v0.1.0/components.yaml
        # sha256 populated by release engineering at publish time.
